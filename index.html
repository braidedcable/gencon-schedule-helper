<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GenCon 2026 Schedule Helper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app" v-cloak>

  <!-- Loading -->
  <div v-if="loading" class="loading-screen">
    <div class="spinner"></div>
    <p>Loading 25,000+ events…</p>
  </div>

  <template v-else>

    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <span class="brand-name">GenCon 2026</span>
        <span class="brand-sub">Schedule Helper</span>
      </div>
      <nav class="header-nav">
        <button @click="setView('browse')" :class="['nav-btn', {active: view==='browse'}]">Browse</button>
        <button @click="setView('schedule')" :class="['nav-btn', {active: view==='schedule' || view==='shared'}]">
          My Schedule<span v-if="myPicks.size || customEvents.length" class="nav-count">{{ myPicks.size + customEvents.length }}</span>
        </button>
        <button @click="setView('group')" :class="['nav-btn', {active: view==='group'}]">
          Group<span v-if="groupId" class="nav-dot"></span>
        </button>
      </nav>
      <!-- Mobile filter toggle -->
      <button class="filter-toggle" @click="filtersOpen = !filtersOpen" aria-label="Toggle filters">
        <span>Filters</span>
        <span v-if="activeFilterCount" class="filter-badge">{{ activeFilterCount }}</span>
      </button>
    </header>

    <!-- ═══════════════ BROWSE VIEW ═══════════════ -->
    <div v-show="view==='browse'" class="browse-layout">

      <!-- Filter Sidebar -->
      <aside :class="['filters-panel', {open: filtersOpen}]">
        <div class="filters-inner">

          <div class="filter-section">
            <input
              v-model="search"
              type="search"
              placeholder="Search titles, games, GMs…"
              class="search-input"
              autocomplete="off"
            >
          </div>

          <div class="filter-section">
            <div class="filter-label">Day</div>
            <div class="day-tabs">
              <button v-for="d in days" :key="d.value"
                @click="toggleDay(d.value)"
                :class="['day-tab', {active: filterDay.has(d.value)}]">
                {{ d.label }}
              </button>
            </div>
          </div>

          <div class="filter-section">
            <div class="filter-label">Event Type</div>
            <div class="type-grid">
              <button v-for="t in eventTypes" :key="t.code"
                @click="toggleType(t.code)"
                :class="['type-chip', {active: selectedTypes.has(t.code)}]"
                :style="selectedTypes.has(t.code) ? {background: t.color, borderColor: t.color, color:'#fff'} : {borderColor: t.color, color: t.color}">
                {{ t.label }}<small>{{ t.count.toLocaleString() }}</small>
              </button>
            </div>
          </div>

          <div class="filter-section">
            <div class="filter-label">Max Cost: <strong>{{ maxCost >= 200 ? '$200+' : '$' + maxCost }}</strong></div>
            <input type="range" v-model.number="maxCost" min="0" max="200" step="5" class="range-slider">
            <div class="range-labels"><span>Free</span><span>$200+</span></div>
          </div>

          <div class="filter-section filter-toggles">
            <label class="check-label">
              <input type="checkbox" v-model="openOnly"> Available tickets only
            </label>
            <label class="check-label">
              <input type="checkbox" v-model="showPicked"> My picks only
            </label>
          </div>

          <!-- More filters collapsible -->
          <div class="more-filters">
            <button class="more-filters-toggle" @click="moreFiltersOpen = !moreFiltersOpen">
              <span>More filters</span>
              <span v-if="moreFilterCount" class="more-filter-count">{{ moreFilterCount }}</span>
              <span class="more-filters-arrow" :class="{open: moreFiltersOpen}">▾</span>
            </button>

            <div v-show="moreFiltersOpen" class="more-filters-body">

              <div class="filter-section">
                <div class="filter-label">Experience level</div>
                <div class="option-chips">
                  <button v-for="exp in allExps" :key="exp"
                    @click="toggleExp(exp)"
                    :class="['option-chip', {active: selectedExps.has(exp)}]">
                    {{ EXP_LABELS[exp] || exp }}
                  </button>
                </div>
              </div>

              <div class="filter-section">
                <div class="filter-label">Age requirement</div>
                <div class="option-chips">
                  <button v-for="age in allAges" :key="age"
                    @click="toggleAge(age)"
                    :class="['option-chip', {active: selectedAges.has(age)}]">
                    {{ AGE_LABELS[age] || age }}
                  </button>
                </div>
              </div>

              <div class="filter-section">
                <div class="filter-label">Max duration: <strong>{{ maxDuration >= 10 ? '10h+' : maxDuration + 'h' }}</strong></div>
                <input type="range" v-model.number="maxDuration" min="0.5" max="10" step="0.5" class="range-slider">
                <div class="range-labels"><span>30 min</span><span>10h+</span></div>
              </div>

              <div class="filter-section">
                <div class="filter-label">Venue</div>
                <div class="option-chips">
                  <button v-for="v in allVenues" :key="v"
                    @click="toggleVenue(v)"
                    :class="['option-chip', {active: selectedVenues.has(v)}]">
                    {{ v }}
                  </button>
                </div>
              </div>

              <div class="filter-section filter-toggles">
                <label class="check-label">
                  <input type="checkbox" v-model="noMaterials"> No materials required
                </label>
                <label class="check-label">
                  <input type="checkbox" v-model="noTournaments"> Exclude tournaments
                </label>
              </div>

            </div>
          </div>

          <div class="filter-footer">
            <span class="result-count"><strong>{{ filteredEvents.length.toLocaleString() }}</strong> events</span>
            <button v-if="activeFilterCount" @click="clearFilters" class="clear-btn">Clear all</button>
          </div>
        </div>
      </aside>

      <!-- Event List -->
      <main class="events-panel">
        <div v-if="filteredEvents.length === 0" class="empty-state">
          <p>No events match your filters.</p>
          <button @click="clearFilters" class="btn-primary">Clear filters</button>
        </div>

        <div class="event-list">
          <div
            v-for="e in displayedEvents"
            :key="e.id"
            class="event-card"
            :class="{
              'is-picked': myPicks.has(e.id),
              'is-conflict': conflicts.has(e.id),
              'is-group': isGroupPick(e.id) && !myPicks.has(e.id)
            }"
            @click="selectedEvent = e"
          >
            <div class="card-top">
              <span class="type-badge" :style="{background: typeColor(e.type)}">{{ typeCode(e.type) }}</span>
              <span class="card-title">{{ e.title }}</span>
              <button
                class="wish-btn"
                :class="{active: wishlist.has(e.id)}"
                @click.stop="toggleWishlist(e.id)"
                :title="wishlist.has(e.id) ? 'Remove from wishlist' : 'Add to wishlist'"
              >★</button>
              <button
                class="pick-btn"
                :class="{picked: myPicks.has(e.id)}"
                @click.stop="togglePick(e.id)"
                :title="myPicks.has(e.id) ? 'Remove from schedule' : 'Add to schedule'"
              >{{ myPicks.has(e.id) ? '✓' : '+' }}</button>
            </div>
            <div class="card-meta">
              <span>{{ formatDayShort(e.start) }} {{ formatTime(e.start) }}</span>
              <span>{{ e.dur }}h</span>
              <span>{{ e.minP }}–{{ e.maxP }} players</span>
              <span :class="{free: e.cost === 0}">{{ e.cost === 0 ? 'Free' : '$' + e.cost }}</span>
              <span :class="{sold: e.tix === 0, low: e.tix > 0 && e.tix <= 3}">
                {{ e.tix === 0 ? 'Sold out' : e.tix + ' tickets' }}
              </span>
            </div>
            <div class="card-footer">
              <span v-if="e.loc" class="card-loc">{{ e.loc }}{{ e.room ? ' · ' + e.room : '' }}</span>
              <span v-if="e.gm" class="card-gm">GM: {{ e.gm }}</span>
              <span v-if="groupWantsCount(e.id)" class="group-interest">
                ⭐ {{ groupWantsCount(e.id) }} {{ groupWantsCount(e.id) === 1 ? 'person' : 'people' }} in your group want this
              </span>
            </div>
          </div>
        </div>

        <div v-if="hasMore" class="load-more">
          <button @click="page++" class="load-more-btn">
            Show more ({{ displayedEvents.length }} of {{ filteredEvents.length.toLocaleString() }})
          </button>
        </div>
      </main>
    </div>

    <!-- ═══════════════ SCHEDULE VIEW ═══════════════ -->
    <div v-show="view==='schedule'" class="schedule-view">
      <div v-if="mySchedule.length === 0" class="empty-state centered">
        <h2>No events scheduled yet</h2>
        <p>Browse events and tap + to add them, or add a custom event.</p>
        <button @click="setView('browse')" class="btn-primary">Browse Events</button>
        <button @click="openCustomForm()" class="btn-secondary">+ Custom event</button>
      </div>

      <template v-if="mySchedule.length > 0">
        <div class="schedule-toolbar">
          <div class="schedule-stats">
            <span><strong>{{ mySchedule.length }}</strong> events</span>
            <span>Total: <strong>${{ totalCost }}</strong></span>
            <span v-if="conflicts.size" class="conflict-pill">⚠ {{ conflicts.size }} conflict{{ conflicts.size > 1 ? 's' : '' }}</span>
          </div>
          <button @click="openCustomForm()" class="btn-secondary">+ Custom event</button>
          <button @click="exportICS" class="btn-secondary">⬇ Export .ics</button>
          <button @click="copyShareLink" class="btn-secondary share-btn">
            {{ shareLinkCopied ? '✓ Copied!' : '⎘ Share itinerary' }}
          </button>
        </div>

        <!-- Day sections -->
        <div v-for="day in scheduleDays" :key="day.date" class="schedule-day">
          <h3 class="day-heading">{{ day.label }}</h3>
          <div
            v-for="e in day.events"
            :key="e.id"
            class="schedule-event"
            :class="{'is-conflict': conflicts.has(e.id)}"
            @click="e.custom ? openCustomForm(e) : selectedEvent = e"
          >
            <div class="sched-time">
              <span class="sched-start">{{ formatTime(e.start) }}</span>
              <span class="sched-end">{{ formatTime(e.end) }}</span>
            </div>
            <span v-if="e.custom" class="custom-badge">Custom</span>
            <span v-else class="type-badge sm" :style="{background: typeColor(e.type)}">{{ typeCode(e.type) }}</span>
            <div class="sched-info">
              <div class="sched-title-block">
                <span class="sched-title">{{ e.title }}</span>
                <span class="sched-loc">{{ e.loc }}{{ e.room ? ' · ' + e.room : '' }}</span>
              </div>
            </div>
            <div class="sched-right">
              <span v-if="!e.custom" class="sched-cost">{{ e.cost === 0 ? 'Free' : '$' + e.cost }}</span>
              <button class="remove-btn" @click.stop="e.custom ? deleteCustomEvent(e.id) : togglePick(e.id)" :title="e.custom ? 'Delete' : 'Remove'">✕</button>
            </div>
          </div>
        </div>
      </template>

      <!-- ── Wishlist / Registration ─────────────────────── -->
      <div class="wishlist-section">
        <h3 class="section-heading wishlist-heading">★ Registration Wishlist</h3>

        <div class="reg-countdown">
          <div v-if="registrationOpen" class="reg-open-banner">
            Registration is open!
          </div>
          <template v-else>
            <p class="countdown-label-text">Registration opens May 17 at noon ET</p>
            <div class="countdown-display">
              <div class="countdown-unit">
                <span class="countdown-num">{{ countdown.d }}</span>
                <span class="countdown-sublabel">days</span>
              </div>
              <span class="countdown-sep">:</span>
              <div class="countdown-unit">
                <span class="countdown-num">{{ countdown.h }}</span>
                <span class="countdown-sublabel">hrs</span>
              </div>
              <span class="countdown-sep">:</span>
              <div class="countdown-unit">
                <span class="countdown-num">{{ countdown.m }}</span>
                <span class="countdown-sublabel">min</span>
              </div>
              <span class="countdown-sep">:</span>
              <div class="countdown-unit">
                <span class="countdown-num">{{ countdown.s }}</span>
                <span class="countdown-sublabel">sec</span>
              </div>
            </div>
          </template>
          <button
            v-if="wishlist.size > 0"
            @click="openAllWishlistTabs"
            class="btn-secondary open-all-btn"
          >Open all {{ wishlist.size }} event{{ wishlist.size === 1 ? '' : 's' }} on GenCon.com (opens {{ wishlist.size }} tab{{ wishlist.size === 1 ? '' : 's' }})</button>
        </div>

        <div v-if="wishlist.size === 0" class="wishlist-empty">
          Star events from Browse or the event detail to save them here for registration.
        </div>

        <div v-else class="wishlist-events">
          <div
            v-for="e in wishlistEvents"
            :key="e.id"
            class="wishlist-event"
            @click="selectedEvent = e"
          >
            <span class="type-badge sm" :style="{background: typeColor(e.type)}">{{ typeCode(e.type) }}</span>
            <div class="wishlist-info">
              <span class="wishlist-title">{{ e.title }}</span>
              <span class="wishlist-meta">{{ formatDayShort(e.start) }} {{ formatTime(e.start) }}–{{ formatTime(e.end) }}<span v-if="e.loc"> · {{ e.loc }}</span></span>
            </div>
            <div class="wishlist-actions">
              <button
                @click.stop="togglePick(e.id)"
                :class="['btn-xs', myPicks.has(e.id) ? 'btn-xs-success' : '']"
                :title="myPicks.has(e.id) ? 'Already in your schedule' : 'Add to schedule'"
              >{{ myPicks.has(e.id) ? '✓ Scheduled' : '+ Schedule' }}</button>
              <a
                :href="`https://www.gencon.com/events/${e.id.match(/\d+$/)[0]}`"
                target="_blank" rel="noopener"
                class="btn-xs"
                @click.stop
              >View ↗</a>
              <button @click.stop="toggleWishlist(e.id)" class="wish-btn active" title="Remove from wishlist">★</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══════════════ GROUP VIEW ═══════════════ -->
    <div v-show="view==='group'" class="group-view">

      <!-- Setup form -->
      <div v-if="!groupId" class="group-setup">
        <div class="setup-card">
          <h2>Join or Create a Group</h2>
          <p>Share a group name with your friends to coordinate your GenCon schedules in real time.</p>
          <div class="setup-form">
            <input v-model="inputUserName" placeholder="Your name" class="text-input" maxlength="40">
            <input v-model="inputGroupName" placeholder="Group name (e.g. die-hards-2026)" class="text-input" maxlength="60"
              @keyup.enter="joinOrCreateGroup">
            <button
              @click="joinOrCreateGroup"
              :disabled="!inputUserName.trim() || !inputGroupName.trim() || groupLoading"
              class="btn-primary">
              {{ groupLoading ? 'Connecting…' : 'Join or Create Group' }}
            </button>
          </div>
          <p v-if="groupError" class="error-msg">{{ groupError }}</p>
        </div>
      </div>

      <!-- Group dashboard -->
      <div v-else class="group-dashboard">
        <div class="group-header">
          <div>
            <h2>{{ groupName }}</h2>
            <p class="group-you">You: <strong>{{ userName }}</strong></p>
          </div>
          <button @click="leaveGroup" class="btn-ghost">Leave group</button>
        </div>

        <!-- Member summary -->
        <div class="member-list">
          <div v-for="(picks, member) in groupPicks" :key="member" class="member-row">
            <span class="member-dot" :style="{background: memberColors[member]}"></span>
            <span class="member-name" :class="{you: member === userName}">
              {{ member }}{{ member === userName ? ' (you)' : '' }}
            </span>
            <span class="member-events">{{ picks.length }} events</span>
          </div>
          <div v-if="Object.keys(groupPicks).length === 0" class="muted-text">
            No picks yet — invite friends to join "{{ groupName }}"
          </div>
        </div>

        <!-- Shared interests -->
        <div v-if="sharedEvents.length" class="shared-section">
          <h3 class="section-heading collapsible-heading" @click="toggleShared">
            ⭐ Shared Interests
            <span class="collapse-chevron" :class="{open: sharedOpen}">›</span>
          </h3>
          <template v-if="sharedOpen">
            <div
              v-for="e in sharedEvents"
              :key="e.id"
              class="shared-event"
              @click="selectedEvent = e"
            >
              <span class="type-badge sm" :style="{background: typeColor(e.type)}">{{ typeCode(e.type) }}</span>
              <div class="shared-info">
                <span class="shared-title">{{ e.title }}</span>
                <span class="shared-when">{{ formatDayShort(e.start) }} {{ formatTime(e.start) }} <span class="group-sched-dur">({{ e.dur }}h)</span></span>
              </div>
              <div class="shared-who-list">
                <span v-for="m in sharedBy(e.id)" :key="m" class="member-tag"
                  :style="{background: memberColors[m] + '22', color: memberColors[m], borderColor: memberColors[m] + '55'}">
                  {{ m }}
                </span>
              </div>
            </div>
          </template>
        </div>

        <!-- Group schedule: all picks by day/time -->
        <div v-if="groupSchedule.length" class="group-sched-section">
          <h3 class="section-heading">Group Schedule</h3>
          <div v-for="day in groupSchedule" :key="day.date" class="group-sched-day">
            <h4 class="group-sched-day-label collapsible-heading" @click="toggleSchedDay(day.date)">
              {{ day.label }}
              <span class="collapse-chevron" :class="{open: schedDayOpen(day.date)}">›</span>
            </h4>
            <template v-if="schedDayOpen(day.date)">
              <div v-for="e in day.events" :key="e.id" class="group-sched-event" @click="selectedEvent = e">
                <div class="group-sched-time">{{ formatTime(e.start) }} <span class="group-sched-dur">({{ e.dur }}h)</span></div>
                <span class="type-badge sm" :style="{background: typeColor(e.type)}">{{ typeCode(e.type) }}</span>
                <div class="group-sched-info">
                  <span class="group-sched-title">{{ e.title }}</span>
                  <span class="group-sched-loc">{{ e.loc }}</span>
                </div>
                <div class="group-sched-members">
                  <span v-for="m in whoWants(e.id)" :key="m" class="member-tag"
                    :style="{background: memberColors[m] + '22', color: memberColors[m], borderColor: memberColors[m] + '55'}">
                    {{ m }}
                  </span>
                </div>
              </div>
            </template>
          </div>
        </div>

        <div class="group-invite-row">
          <span class="muted-text">Invite friends to <strong>{{ groupName }}</strong>:</span>
          <button @click="copyGroupLink" class="btn-secondary share-btn">
            {{ groupLinkCopied ? '✓ Copied!' : '⎘ Copy invite link' }}
          </button>
        </div>

        <!-- Group chat -->
        <div class="chat-pane">
          <h3 class="section-heading">Group Chat</h3>
          <div class="chat-log" ref="chatLogEl">
            <div v-if="chatMessages.length === 0" class="chat-empty muted-text">No messages yet.</div>
            <div v-for="m in chatMessages" :key="m.id" class="chat-msg">
              <span class="chat-author" :style="{color: memberColors[m.user_name] || nameColor(m.user_name)}">{{ m.user_name }}</span>
              <span class="chat-body">{{ m.body }}</span>
            </div>
          </div>
          <div class="chat-input-row">
            <input
              class="chat-input"
              v-model="chatInput"
              placeholder="Message…"
              maxlength="500"
              @keydown.enter.prevent="sendMessage"
            />
            <button class="btn-primary chat-send" @click="sendMessage" :disabled="chatSending || !chatInput.trim()">Send</button>
          </div>
        </div>

      </div>
    </div>

    <!-- ═══════════════ SHARED VIEW ═══════════════ -->
    <div v-show="view==='shared'" class="schedule-view">
      <div class="shared-banner">
        <div class="shared-banner-info">
          <span class="shared-banner-title">Shared itinerary</span>
          <span class="shared-banner-sub">{{ sharedPickIds.length }} events · ${{ sharedTotalCost }}</span>
        </div>
        <div class="shared-banner-actions">
          <button @click="copySharedToMyPicks" class="btn-primary">+ Add all to my schedule</button>
          <button @click="setView('browse')" class="btn-ghost">Browse events</button>
        </div>
      </div>

      <div v-if="!loading && !sharedSchedule.length" class="empty-state centered">
        <p>No matching events found for this shared link.</p>
        <button @click="setView('browse')" class="btn-primary">Browse Events</button>
      </div>

      <div v-for="day in sharedScheduleDays" :key="day.date" class="schedule-day">
        <h3 class="day-heading">{{ day.label }}</h3>
        <div
          v-for="e in day.events"
          :key="e.id"
          class="schedule-event"
          :class="{'is-conflict': conflicts.has(e.id)}"
          @click="selectedEvent = e"
        >
          <div class="sched-time">
            <span class="sched-start">{{ formatTime(e.start) }}</span>
            <span class="sched-end">{{ formatTime(e.end) }}</span>
          </div>
          <span class="type-badge sm" :style="{background: typeColor(e.type)}">{{ typeCode(e.type) }}</span>
          <div class="sched-info">
            <div class="sched-title-block">
              <span class="sched-title">{{ e.title }}</span>
              <span class="sched-loc">{{ e.loc }}{{ e.room ? ' · ' + e.room : '' }}</span>
            </div>
          </div>
          <div class="sched-right">
            <span class="sched-cost">{{ e.cost === 0 ? 'Free' : '$' + e.cost }}</span>
            <button
              class="pick-btn"
              :class="{picked: myPicks.has(e.id)}"
              @click.stop="togglePick(e.id)"
              :title="myPicks.has(e.id) ? 'Remove from schedule' : 'Add to schedule'"
            >{{ myPicks.has(e.id) ? '✓' : '+' }}</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══════════════ CUSTOM EVENT FORM ════════════════ -->
    <div v-if="showCustomForm" class="modal-backdrop" @click.self="showCustomForm = false">
      <div class="modal" role="dialog">
        <button class="modal-close" @click="showCustomForm = false" aria-label="Close">✕</button>
        <div class="modal-head">
          <h2 class="modal-title">{{ editingCustomId ? 'Edit custom event' : 'Add custom event' }}</h2>
        </div>
        <div class="modal-body">
          <div class="custom-form">
            <div class="form-field">
              <label class="form-label">Title <span class="required">*</span></label>
              <input v-model="customForm.title" type="text" class="text-input" placeholder="What are you doing?" maxlength="200">
              <p v-if="customFormError.title" class="error-msg">{{ customFormError.title }}</p>
            </div>
            <div class="form-field">
              <label class="form-label">Date <span class="required">*</span></label>
              <input v-model="customForm.date" type="date" class="text-input">
              <p v-if="customFormError.date" class="error-msg">{{ customFormError.date }}</p>
            </div>
            <div class="time-row">
              <div class="form-field">
                <label class="form-label">Start <span class="required">*</span></label>
                <input v-model="customForm.startTime" type="time" class="text-input">
                <p v-if="customFormError.startTime" class="error-msg">{{ customFormError.startTime }}</p>
              </div>
              <div class="form-field">
                <label class="form-label">End <span class="required">*</span></label>
                <input v-model="customForm.endTime" type="time" class="text-input">
                <p v-if="customFormError.endTime" class="error-msg">{{ customFormError.endTime }}</p>
              </div>
            </div>
            <div class="form-field">
              <label class="form-label">Location</label>
              <input v-model="customForm.loc" type="text" class="text-input" placeholder="e.g. ICC Hall A, Room 120" maxlength="200">
            </div>
            <div class="form-field">
              <label class="form-label">Notes</label>
              <textarea v-model="customForm.desc" class="text-input custom-textarea" placeholder="Optional notes…" maxlength="1000"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-foot">
          <button v-if="editingCustomId" @click="deleteCustomEvent(editingCustomId); showCustomForm = false" class="btn-danger">Delete</button>
          <button @click="showCustomForm = false" class="btn-ghost">Cancel</button>
          <button @click="saveCustomEvent" class="btn-primary">{{ editingCustomId ? 'Save changes' : 'Add to schedule' }}</button>
        </div>
      </div>
    </div>

    <!-- ═══════════════ EVENT MODAL ═══════════════ -->
    <div v-if="selectedEvent" class="modal-backdrop" @click.self="selectedEvent = null">
      <div class="modal" role="dialog">
        <button class="modal-close" @click="selectedEvent = null" aria-label="Close">✕</button>

        <div class="modal-head">
          <span class="type-badge lg" :style="{background: typeColor(selectedEvent.type)}">{{ selectedEvent.type }}</span>
          <h2 class="modal-title">{{ selectedEvent.title }}</h2>
          <p v-if="selectedEvent.grp" class="modal-grp">by {{ selectedEvent.grp }}</p>
        </div>

        <div class="modal-body">
          <p v-if="selectedEvent.desc" class="modal-desc">{{ selectedEvent.desc }}</p>

          <div class="modal-grid">
            <div class="modal-row">
              <span class="modal-label">When</span>
              <span>{{ formatDayLong(selectedEvent.start) }}, {{ formatTime(selectedEvent.start) }} – {{ formatTime(selectedEvent.end) }} ({{ selectedEvent.dur }}h)</span>
            </div>
            <div class="modal-row">
              <span class="modal-label">Where</span>
              <span>{{ selectedEvent.loc }}{{ selectedEvent.room ? ', ' + selectedEvent.room : '' }}{{ selectedEvent.tbl && selectedEvent.tbl !== 'None' ? ', Table ' + selectedEvent.tbl : '' }}</span>
            </div>
            <div class="modal-row">
              <span class="modal-label">Players</span>
              <span>{{ selectedEvent.minP }}–{{ selectedEvent.maxP }}</span>
            </div>
            <div class="modal-row">
              <span class="modal-label">Age</span>
              <span>{{ selectedEvent.age || '—' }}</span>
            </div>
            <div class="modal-row">
              <span class="modal-label">Experience</span>
              <span>{{ selectedEvent.exp || '—' }}</span>
            </div>
            <div v-if="selectedEvent.sys" class="modal-row">
              <span class="modal-label">System</span>
              <span>{{ selectedEvent.sys }}</span>
            </div>
            <div v-if="selectedEvent.gm" class="modal-row">
              <span class="modal-label">GM</span>
              <span>{{ selectedEvent.gm }}</span>
            </div>
            <div class="modal-row">
              <span class="modal-label">Cost</span>
              <span>{{ selectedEvent.cost === 0 ? 'Free' : '$' + selectedEvent.cost }}</span>
            </div>
            <div class="modal-row">
              <span class="modal-label">Tickets</span>
              <span :class="{sold: selectedEvent.tix === 0}">
                {{ selectedEvent.tix === 0 ? 'Sold out' : selectedEvent.tix + ' available' }}
              </span>
            </div>
            <div class="modal-row">
              <span class="modal-label">Event ID</span>
              <span class="mono">{{ selectedEvent.id }}</span>
            </div>
          </div>
        </div>

        <div class="modal-foot">
          <span v-if="conflicts.has(selectedEvent.id)" class="conflict-warn">⚠ Conflicts with another pick</span>
          <button
            @click="toggleWishlist(selectedEvent.id)"
            :class="['wish-btn', 'modal-wish', {active: wishlist.has(selectedEvent.id)}]"
            :title="wishlist.has(selectedEvent.id) ? 'Remove from wishlist' : 'Add to wishlist'"
          >{{ wishlist.has(selectedEvent.id) ? '★ Wishlisted' : '☆ Wishlist' }}</button>
          <a :href="`https://www.gencon.com/events/${selectedEvent.id.match(/\d+$/)[0]}`"
            target="_blank" rel="noopener" class="btn-secondary">
            View on GenCon ↗
          </a>
          <button
            @click="togglePick(selectedEvent.id)"
            :class="myPicks.has(selectedEvent.id) ? 'btn-danger' : 'btn-primary'"
          >
            {{ myPicks.has(selectedEvent.id) ? '✕ Remove from Schedule' : '+ Add to Schedule' }}
          </button>
        </div>
      </div>
    </div>

  </template>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="app.js"></script>
</body>
</html>
