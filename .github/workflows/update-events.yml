name: Update event data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Download events zip
        run: curl -fL "https://www.gencon.com/downloads/events.zip" -o events.zip

      - name: Extract xlsx from zip
        run: |
          python3 - <<'EOF'
          import zipfile, shutil
          with zipfile.ZipFile('events.zip') as z:
              xlsx = next(n for n in z.namelist() if n.lower().endswith('.xlsx'))
              with z.open(xlsx) as src, open('events.xlsx', 'wb') as dst:
                  shutil.copyfileobj(src, dst)
          EOF

      - name: Convert to JSON
        run: python convert.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json meta.json
          if git diff --cached --quiet; then
            echo "No changes to event data"
          else
            COUNT=$(python3 -c "import json; d=json.load(open('events.json')); print(len(d))")
            git commit -m "chore: update event data — ${COUNT} events [skip ci]"
            git push
          fi
